# PCBuilder Development Overrides
version: '3.8'

services:
  # Mount local source code in developer API container for rapid iteration
  api:
    volumes:
      - ./server:/src/server
      - ~/.aspnet/https:/https:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_LOGGING__CONSOLE__DISABLECOLORS=false

  # Enable hot module replacement (HMR) for Frontend React client
  client:
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
