services:
  # Mount local source code in developer API container for rapid iteration
  api:
    volumes:
      - ./server:/src/server
      - ~/.aspnet/https:/https:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_LOGGING__CONSOLE__DISABLECOLORS=false

  client:
    build:
      context: .
      dockerfile: docker/client/Dockerfile
      target: build
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:80"
    command: npm run dev -- --host 0.0.0.0 --port 80
