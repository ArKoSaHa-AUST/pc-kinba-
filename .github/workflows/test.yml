name: Testing Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  test:
    name: Run Test Suite & Check Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet Packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore C# Dependencies
        run: dotnet restore PCBuilder.sln

      - name: Build Solution for Testing
        run: dotnet build PCBuilder.sln --no-restore -c Release /p:TreatWarningsAsErrors=true

      - name: Run Test Suite with Code Coverage
        run: |
          dotnet test server/tests/PCBuilder.UnitTests/PCBuilder.UnitTests.csproj \
            --no-build \
            -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=unit-test-results.trx"
          dotnet test server/tests/PCBuilder.IntegrationTests/PCBuilder.IntegrationTests.csproj \
            --no-build \
            -c Release \
            --results-directory ./coverage \
            --logger "trx;LogFileName=integration-test-results.trx"

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_coverage: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '80 90'

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/**/*.trx
            coverage/**/*.xml
