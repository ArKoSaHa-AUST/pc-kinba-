name: Build Pipeline

on:
  push:
    branches: [ main, develop, 'release/*', 'hotfix/*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  backend-build:
    name: Build Backend (.NET 9.0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore C# Dependencies
        run: dotnet restore PCBuilder.sln

      - name: Compile Backend (Treat Warnings as Errors)
        run: dotnet build PCBuilder.sln --no-restore -c Release /p:TreatWarningsAsErrors=true

      - name: Publish Backend API
        run: dotnet publish server/src/PCBuilder.API/PCBuilder.API.csproj -c Release -o ./publish --no-build

  frontend-build:
    name: Build Frontend (Vite + React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: client
        run: npm ci

      - name: Compile Frontend Application
        working-directory: client
        run: npm run build
