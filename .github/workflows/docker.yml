name: Docker Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  validate-docker:
    name: Hadolint Lint & Compose Config Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/api/Dockerfile
          ignore: 'DL3008,DL3003' # Allow apt-get installs without version pin and building in subdirectory

      - name: Lint Client Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/client/Dockerfile

      - name: Lint AI Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/ai/Dockerfile

      - name: Copy Env Example for Compose
        run: cp .env.example .env

      - name: Validate Docker Compose Configuration
        run: docker compose config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker Layers
        uses: actions/cache@v6
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Stack Services (Validation Only)
        run: |
          docker compose build
