version: 2
updates:
  # NuGet dependency updates
  - package-ecosystem: "nuget"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "00:00"
      timezone: "Asia/Dhaka"
    open-pull-requests-limit: 10

  # Node dependencies for frontend
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:00"
      timezone: "Asia/Dhaka"
    open-pull-requests-limit: 10

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
